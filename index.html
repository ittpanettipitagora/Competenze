<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hub Registri Competenze</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0ede8; 
    --surface: #ffffff; 
    --border: #d4cfc8;
    --text: #1a1714; 
    --text-muted: #6b6359; 
    --accent: #2563eb;
    --font: 'IBM Plex Sans', sans-serif; 
    --mono: 'IBM Plex Mono', monospace;
  }
  
  body {
    font-family: var(--font); 
    background: var(--bg); 
    color: var(--text);
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    padding: 60px 20px;
    margin: 0; 
    min-height: 100vh;
  }
  
  .header { 
    text-align: center; 
    margin-bottom: 50px; 
  }
  
  .header h1 { 
    font-family: var(--mono); 
    font-size: 28px; /* Titolo più grande */
    text-transform: uppercase; 
    letter-spacing: 0.05em; 
    margin-bottom: 10px;
  }
  
  .header p { 
    color: var(--text-muted); 
    font-size: 16px; 
  }
  
  /* --- CONTENITORE PULSANTI --- */
  .button-container {
    display: flex; 
    flex-direction: column; /* <--- Questo li mette uno sotto l'altro! */
    gap: 24px; /* Spazio tra i due bottoni */
    width: 100%; 
    max-width: 400px; /* Larghezza massima dei pulsanti */
  }
  
  /* --- STILE DEI PULSANTI --- */
  .class-btn {
    display: flex; 
    align-items: center; 
    justify-content: center;
    background: var(--surface); 
    border: 2px solid var(--border); 
    border-radius: 12px; /* Angoli un po' più arrotondati */
    padding: 30px; /* <--- Questo li fa diventare molto alti/grandi */
    font-size: 22px; /* <--- Testo più grande */
    font-weight: 700; 
    font-family: var(--mono);
    color: var(--text); 
    text-decoration: none; 
    transition: all 0.2s ease;
    box-shadow: 0 4px 6px rgba(0,0,0,0.05);
  }
  
  .class-btn:hover {
    border-color: var(--text); 
    transform: translateY(-4px); /* Effetto sollevamento al passaggio del mouse */
    box-shadow: 0 8px 15px rgba(0,0,0,0.1);
  }
</style>
</head>
<body>

  <div class="header">
    <h1>Registri Competenze</h1>
    <p>Seleziona l'anno.</p>
  </div>

  <div class="button-container">
    <a href="https://ittpanettipitagora.github.io/CompetenzePrime" class="class-btn">Classi Prime</a>
    
    <a href="https://ittpanettipitagora.github.io/CompetenzeSeconda" class="class-btn">Classi Seconde</a>
  </div>

</body>
</html>
