<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hub Registri Competenze — Panetti Pitagora</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<style>
:root {
  --bg: #f0ede8;
  --surface: #ffffff;
  --border: #d4cfc8;
  --text: #1a1714;
  --text-muted: #6b6359;
  --accent: #2563eb;
  --font: 'IBM Plex Sans', sans-serif;
  --mono: 'IBM Plex Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
}

/* Griglia geometrica sfondo */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(to right, rgba(37,99,235,.04) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(37,99,235,.04) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}

/* ---- SCHERMATA LOGIN ---- */
#screen-login {
  display: none;
  flex-direction: column;
  align-items: center;
  width: 100%;
  max-width: 420px;
}

.login-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 48px 40px;
  width: 100%;
  box-shadow: 0 8px 32px rgba(0,0,0,.08);
  text-align: center;
}

.school-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: #eff6ff;
  border: 1px solid #bfdbfe;
  border-radius: 99px;
  padding: 6px 14px;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: .04em;
  text-transform: uppercase;
  margin-bottom: 24px;
}

.school-dot {
  width: 6px; height: 6px;
  background: var(--accent);
  border-radius: 50%;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: .5; transform: scale(.8); }
}

.login-icon { font-size: 44px; margin-bottom: 16px; display: block; }

.login-card h1 {
  font-family: var(--mono);
  font-size: 18px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .05em;
  margin-bottom: 8px;
}

.login-card .subtitle {
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.6;
  margin-bottom: 28px;
}

.btn-google {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  width: 100%;
  padding: 14px 20px;
  background: var(--text);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-family: var(--font);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all .2s ease;
}

.btn-google:hover {
  background: #2d2520;
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(0,0,0,.2);
}

.btn-google:disabled { background: #9ca3af; cursor: not-allowed; transform: none; }

.google-icon { width: 20px; height: 20px; flex-shrink: 0; }

.error-box {
  margin-top: 14px;
  padding: 10px 14px;
  background: #fef2f2;
  border: 1px solid #fca5a5;
  border-radius: 8px;
  font-size: 12px;
  color: #dc2626;
  display: none;
  text-align: left;
  line-height: 1.5;
}

.loading-spinner {
  display: inline-block;
  width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .6s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ---- SCHERMATA HUB ---- */
#screen-hub {
  display: none;
  flex-direction: column;
  align-items: center;
  width: 100%;
}

/* Topbar utente */
.topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 52px;
  background: var(--text);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  z-index: 100;
}

.topbar-title {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: #fff;
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.user-email {
  font-family: var(--mono);
  font-size: 11px;
  color: #9ca3af;
}

.btn-logout {
  background: #374151;
  color: #9ca3af;
  border: none;
  padding: 5px 12px;
  border-radius: 6px;
  font-size: 11px;
  font-family: var(--mono);
  cursor: pointer;
  transition: color .2s;
}

.btn-logout:hover { color: #fff; }

/* Contenuto hub */
.hub-content {
  margin-top: 52px;
  padding: 60px 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
}

.header {
  text-align: center;
  margin-bottom: 40px;
}

.header h1 {
  font-family: var(--mono);
  font-size: 26px;
  text-transform: uppercase;
  letter-spacing: .05em;
  margin-bottom: 10px;
}

.header p { color: var(--text-muted); font-size: 15px; }

.button-container {
  display: flex;
  flex-direction: column;
  gap: 20px;
  width: 100%;
  max-width: 400px;
}

.class-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 12px;
  padding: 30px;
  font-size: 20px;
  font-weight: 700;
  font-family: var(--mono);
  color: var(--text);
  text-decoration: none;
  transition: all .2s ease;
  box-shadow: 0 4px 6px rgba(0,0,0,.05);
}

.class-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  transform: translateY(-3px);
  box-shadow: 0 8px 20px rgba(37,99,235,.12);
}

/* ---- LOADING INIZIALE ---- */
#screen-loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}

.big-spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}

.loading-label {
  font-family: var(--mono);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--text-muted);
}

@media (max-width: 480px) {
  .login-card { padding: 32px 22px; }
  .header h1 { font-size: 20px; }
  .class-btn { padding: 22px; font-size: 18px; }
}
</style>
</head>
<body>

<!-- LOADING -->
<div id="screen-loading">
  <div class="big-spinner"></div>
  <div class="loading-label">Verifica sessione...</div>
</div>

<!-- LOGIN -->
<div id="screen-login">
  <div class="login-card">
    <div class="school-badge">
      <span class="school-dot"></span>
      I.I.S. Panetti Pitagora
    </div>
    <span class="login-icon">🏫</span>
    <h1>Registro Competenze</h1>
    <p class="subtitle">
      Accedi con il tuo account Google istituzionale per entrare nel sistema.
    </p>
    <button class="btn-google" id="btn-google" onclick="loginGoogle()">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Accedi con Google
    </button>
    <div class="error-box" id="error-box"></div>
  </div>
</div>

<!-- HUB -->
<div id="screen-hub">
  <div class="topbar">
    <span class="topbar-title">Registro Competenze</span>
    <div class="topbar-right">
      <span class="user-email" id="user-email"></span>
      <button class="btn-logout" onclick="logout()">⏏ Esci</button>
    </div>
  </div>

  <div class="hub-content">
    <div class="header">
      <h1>Registri Competenze</h1>
      <p>Seleziona l'anno scolastico.</p>
    </div>
    <div class="button-container">
      <a href="https://ittpanettipitagora.github.io/CompetenzePrime" class="class-btn">📚 Classi Prime</a>
      <a href="https://ittpanettipitagora.github.io/CompetenzeSeconda" class="class-btn">📗 Classi Seconde</a>
    </div>
  </div>
</div>

<script>
const DOMINIO_SCUOLA = "panettipitagora.edu.it";
const SUPER_ADMIN_EMAILS = []; // aggiungi email admin se necessario

const firebaseConfig = {
  apiKey: "AIzaSyAlK-hnw92Flf3-M3HBp1T5hGodjAjECnE",
  authDomain: "registrocompetenze-ac4fb.firebaseapp.com",
  projectId: "registrocompetenze-ac4fb",
  storageBucket: "registrocompetenze-ac4fb.firebasestorage.app",
  messagingSenderId: "954190679375",
  appId: "1:954190679375:web:bc71cd19c1bb1896c4093a"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// Controlla stato sessione all'avvio
auth.onAuthStateChanged((user) => {
  document.getElementById('screen-loading').style.display = 'none';

  if (user && isDominioAutorizzato(user.email)) {
    mostraHub(user);
  } else {
    if (user) auth.signOut(); // loggato con dominio sbagliato → disconnetti
    mostraLogin();
  }
});

function isDominioAutorizzato(email) {
  const dominio = (email || '').split('@')[1] || '';
  return dominio === DOMINIO_SCUOLA || SUPER_ADMIN_EMAILS.includes(email);
}

function mostraLogin() {
  document.getElementById('screen-login').style.display = 'flex';
  document.getElementById('screen-hub').style.display = 'none';
}

function mostraHub(user) {
  document.getElementById('screen-login').style.display = 'none';
  document.getElementById('screen-hub').style.display = 'flex';
  document.getElementById('user-email').textContent = user.email;
}

function loginGoogle() {
  const btn = document.getElementById('btn-google');
  const errBox = document.getElementById('error-box');
  errBox.style.display = 'none';
  btn.disabled = true;
  btn.innerHTML = `<div class="loading-spinner"></div> Accesso in corso...`;

  const provider = new firebase.auth.GoogleAuthProvider();
  provider.setCustomParameters({ prompt: 'select_account' });

  auth.signInWithPopup(provider)
    .then((result) => {
      const email = result.user.email || '';
      if (!isDominioAutorizzato(email)) {
        auth.signOut();
        mostraErrore(`Account non autorizzato.<br>Usa l'account <strong>@${DOMINIO_SCUOLA}</strong>.<br>Hai usato: <code>${email}</code>`);
        btn.disabled = false;
        btn.innerHTML = `<svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg> Accedi con Google`;
      }
      // Se ok → onAuthStateChanged pensa a tutto
    })
    .catch((err) => {
      btn.disabled = false;
      btn.innerHTML = `<svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg> Accedi con Google`;
      if (err.code !== 'auth/popup-closed-by-user') mostraErrore("Errore: " + err.message);
    });
}

function mostraErrore(msg) {
  const box = document.getElementById('error-box');
  box.innerHTML = '❌ ' + msg;
  box.style.display = 'block';
}

function logout() {
  if (confirm("Vuoi disconnetterti?")) auth.signOut();
}
</script>
</body>
</html>
